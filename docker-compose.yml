version: '3.8'

services:
  publisher:
    build: .
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - API_KEY=your-secure-api-key-here
      - WECHAT_APPID=wx1234567890
      - WECHAT_SECRET=your-secret-here
      - DB_PATH=./data/publisher.db
      - WORKER_COUNT=3
      - TASK_TIMEOUT=120
    volumes:
      - ./data:/root/data
      - /tmp:/tmp
    restart: unless-stopped